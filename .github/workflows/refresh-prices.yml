name: Refresh flight prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch prices from Travelpayouts
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          ORIGINS: ATL,DXB,HND,DFW,PVG,LHR,DEN,IST,CAN,ORD,CDG,FRA,AMS
          MONTHS_AHEAD: '6'
        run: node scripts/fetch-prices.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/prices.json
          if git diff --staged --quiet; then
            echo "No price changes"
          else
            git commit -m "chore: refresh prices.json [skip ci]"
            git push
          fi
